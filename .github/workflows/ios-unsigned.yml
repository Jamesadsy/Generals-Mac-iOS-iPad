name: ios-unsigned
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/ios-unsigned.yml'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init the DXVK submodule (recursive for its Vulkan-Headers)
        run: git submodule update --init --recursive references/fbraz3-dxvk

      - name: Toolchain
        run: brew install cmake ninja meson pkgconf

      - name: vcpkg full clone
        run: |
          git clone https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh"
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Install Vulkan SDK (static MoltenVK for the link step)
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          install_runtime: true
          cache: true

      - name: Fetch pinned MoltenVK framework
        run: ./scripts/build/ios/fetch-moltenvk.sh

      - name: Stage fonts
        run: ./scripts/build/ios/stage-fonts.sh

      - name: Configure
        run: cmake --preset ios-vulkan

      - name: Build the engine
        run: cmake --build build/ios-vulkan --target z_generals

      - name: Assemble bundle (dylibs, MoltenVK, rpath, fonts, config)
        run: |
          set -e
          APP="build/ios-vulkan/GeneralsMD/GeneralsXZH.app"
          test -f "$APP/GeneralsXZH" || { echo "engine binary missing"; exit 1; }
          mkdir -p "$APP/Frameworks"
          B="build/ios-vulkan"
          cp "$B/_deps/dxvk-build-macos/src/d3d8/libdxvk_d3d8.0.dylib" "$APP/Frameworks/"
          cp "$B/_deps/dxvk-build-macos/src/d3d9/libdxvk_d3d9.0.dylib" "$APP/Frameworks/"
          cp "$B/_deps/sdl3-build/libSDL3.0.dylib" "$APP/Frameworks/"
          cp "$B/_deps/sdl3_image-build/libSDL3_image.0.dylib" "$APP/Frameworks/"
          cp "$B/_deps/openal_soft-build/libopenal.1.24.2.dylib" "$APP/Frameworks/libopenal.1.dylib"
          cp "$B/libgamespy.dylib" "$APP/Frameworks/" || echo "libgamespy optional"
          MVK="$HOME/GeneralsX/MoltenVK/MoltenVK/MoltenVK/dynamic/MoltenVK.xcframework/ios-arm64/MoltenVK.framework"
          cp -R "$MVK" "$APP/Frameworks/"
          install_name_tool -add_rpath "@executable_path/Frameworks" "$APP/GeneralsXZH" || true
          mkdir -p "$APP/GameData/fonts"
          FDIR="$(dirname "$(find "$HOME/GeneralsX" -name '*.ttf' 2>/dev/null | head -1)")"
          if [ -n "$FDIR" ] && [ "$FDIR" != "." ]; then cp "$FDIR"/*.ttf "$APP/GameData/fonts/"; else echo "WARN no fonts found"; fi
          cp ios/config/dxvk.conf "$APP/GameData/dxvk.conf" || echo "WARN no dxvk.conf"
          cp ios/config/Options.ini "$APP/GameData/DefaultOptions.ini" || echo "WARN no Options.ini"
          echo "=== bundle contents ==="
          find "$APP" -maxdepth 2 -print
          echo "=== otool -L ==="
          otool -L "$APP/GeneralsXZH" || true

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: generalszh-ios-unsigned
          if-no-files-found: warn
          path: build/ios-vulkan/GeneralsMD/GeneralsXZH.app/**

name: ios-unsigned
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/ios-unsigned.yml'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init the DXVK submodule
        run: git submodule update --init references/fbraz3-dxvk

      - name: Toolchain
        run: brew install cmake ninja meson pkgconf

      - name: vcpkg full clone
        run: |
          git clone https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh"
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Install Vulkan SDK (static MoltenVK for the link step)
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          install_runtime: true
          cache: true

      - name: Verify MoltenVK static lib location
        run: |
          echo "VULKAN_SDK = $VULKAN_SDK"
          echo "=== preset wants: \$VULKAN_SDK/lib/MoltenVK.xcframework/ios-arm64/libMoltenVK.a ==="
          ls -la "$VULKAN_SDK/lib/MoltenVK.xcframework/ios-arm64/" || true
          echo "=== searching SDK for any ios libMoltenVK.a ==="
          find "$VULKAN_SDK" -name libMoltenVK.a 2>/dev/null || true

      - name: Fetch pinned MoltenVK framework
        run: ./scripts/build/ios/fetch-moltenvk.sh

      - name: Stage fonts
        run: ./scripts/build/ios/stage-fonts.sh

      - name: Configure
        run: cmake --preset ios-vulkan

      - name: Build the engine
        run: cmake --build build/ios-vulkan --target z_generals

      - name: Assemble unsigned app
        continue-on-error: true
        run: |
          GX_BUNDLE_ID=com.you.generalszh \
          ./scripts/build/ios/package-ios-zh.sh --dev

      - name: Link-path audit
        run: |
          echo "=== candidate binaries ==="
          find build -type f \( -name z_generals -o -name GeneralsXZH -o -name GeneralsZH \) -print
          BIN="$(find build -type f \( -name z_generals -o -name GeneralsXZH \) | head -1)"
          echo "=== otool -L $BIN ==="
          otool -L "$BIN" || true
          echo "=== .app trees found ==="
          find build -name "*.app" -maxdepth 4 -print

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: generalszh-ios-unsigned
          if-no-files-found: warn
          path: |
            build/**/*.app
            build/**/z_generals
            build/**/GeneralsXZH
            build/**/*.dylib
            build/**/MoltenVK.framework/**
